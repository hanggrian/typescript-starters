version: 2.1

orbs:
  codecov: codecov/codecov@5.4.3

executors:
  node:
    docker:
      - image: cimg/node:lts
  renovate:
    docker:
      - image: renovate/renovate:latest

jobs:
  setup-workspace:
    executor: node
    steps:
      - checkout
      - run: pnpm i
      - persist_to_workspace:
          root: .
          paths:
            - .
            - "**/node_modules"
  run-lint:
    executor: node
    steps:
      - attach_workspace:
          at: .
      - run: pnpm lint
  upload-coverage:
    executor: node
    steps:
      - attach_workspace:
          at: .
      - run: pnpm -r test
      - run: pnpm -r coverage
      - codecov/upload
  activate-renovatebot:
    executor: renovate
    steps:
      - run: renovate

workflows:
  code-analysis:
    jobs:
      - setup-workspace
      - run-lint:
          requires: [setup-workspace]
      - upload-coverage:
          requires: [setup-workspace]
      - activate-renovatebot
