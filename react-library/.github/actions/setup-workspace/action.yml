name: Setup Workspace
description: Checkout and install all dependencies

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6

    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
        cache: pnpm

    - uses: actions/cache@v5
      with:
        path: |
          .pnpm-store/
          node_modules/
        key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}

    - shell: bash
      run: pnpm i
